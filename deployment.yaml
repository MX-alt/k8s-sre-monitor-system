# --- 后端：Go 数据采集器 ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: monitor          # 对应 monitor-service
  template:
    metadata:
      labels:
        app: monitor
    spec:
      containers:
      - name: go-monitor
        image: system-monitor:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081

--- # <--- 分隔符

# --- 前端：Nginx 反向代理 ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-proxy      # 对应 nginx-service
  template:
    metadata:
      labels:
        app: nginx-proxy
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: config-volume
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: config-volume
        configMap:
          name: nginx-config